version: '3.8'

services:

  web:

    build: .

    container_name: web-server

    restart: unless-stopped

    ports:
      - "8443:8443"
      - "2222:22"
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/B-Hak_Sengkea-db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123

    depends_on:
      - mysql

  mysql:

    image: mysql:8

    container_name: B-Hak_Sengkea-db

    networks:
        default:
          aliases:
            - mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: B-Hak_Sengkea-db

    # ports:
    #   - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: